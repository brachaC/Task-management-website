<header>
  <nav class="navbar">
    <ul>
      <li *ngFor="let button of buttons">
        <a [innerText]="button.name"
           [routerLink]="button.link"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: false }">
        </a>
      </li>
    </ul>
  </nav>

  <div class="server-status">
    <span *ngIf="isServerAlive === null" class="checking">בודק מצב שרת...</span>
    <span *ngIf="isServerAlive === true" class="online">✅ השרת פעיל</span>
    <span *ngIf="isServerAlive === false" class="offline">❌ השרת אינו פעיל</span>
  </div>
</header>

<div class="flex-col">
  <app-tasks></app-tasks>
</div>

<app-chat></app-chat> <!-- יופיע בפינה הימנית התחתונה -->
